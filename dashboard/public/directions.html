<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>ATARAXIA — 3 Design Directions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Serif:ital,wght@0,400;0,600;1,400;1,600&family=IBM+Plex+Mono:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,700;1,800;1,900&display=swap" rel="stylesheet">
<style>
  body { margin: 0; background: #0a0908; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="dir-editorial.jsx"></script>
<script type="text/babel" src="dir-bloomberg.jsx"></script>
<script type="text/babel" src="dir-brutalist.jsx"></script>

<script type="text/babel" data-presets="env,react">
  const { DesignCanvas, DCSection, DCArtboard } = window;
  function App() {
    return (
      <DesignCanvas title="ATARAXIA — Yön keşfi">
        <DCSection id="dirs" title="Üç tasarım yönü · Kokpit ekranı">
          <DCArtboard id="editorial" label="① Editorial Bone — IBM Plex, hairline, magazine" width={1280} height={800}>
            <window.EditorialBone />
          </DCArtboard>
          <DCArtboard id="bloomberg" label="② Bloomberg Terminal — dense, mono, blueprint grid" width={1280} height={800}>
            <window.BloombergTerminal />
          </DCArtboard>
          <DCArtboard id="brutalist" label="③ Brutalist Mono — oversized italic display, tonal layers" width={1280} height={800}>
            <window.BrutalistMono />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
